<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
    <title>Sign up form</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">

    <div class="logo">
        <img src="images/odin-lined.png" alt="Odin logo">
        <h1>ODIN</h1>
    </div>

    <p class="credit">
        Photo by Halie West on Unsplash
    </p>

</div>
        <div class="main">
            <div class="paragraph">
                <p>This is not a real online service ! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
               <p>You <em>know</em> you want to.</p>
            </div>
            <div class="form-card">
                       <h2>Let's do this!</h2>
 <form class="form" method="post">
    <div class="row">
        <div class="field">
            <label for="FirstName">FIRST NAME</label>
            <input type="text" name="Name" id="FirstName">
        </div>
        <div class="field">
            <label for="LastName">LAST NAME</label>
            <input type="text" name="Last" id="LastName">
        </div>
        </div>
    
    
       
        
     <div class="row">
        <div class="field">
<label for="Email">EMAIL</label> 
            <input type="email" name="email" id="Email">
        </div>
        <div class="field">
 <label for="Phone">PHONE NUMBER</label>
            <input type="tel" name="Phone" id="Phone">
        </div>
     </div>  

           
     <div class="row">
        <div class="field">
<label for="password">PASSWORD</label>
            <input type="password" name="password" id="password">
        </div>
        <div class="field">

            <label for="confirmpassword">CONFIRM PASSWORD</label>
            <input type="password" name="confirm" id="confirmpassword">
        </div>
     </div>


       

       


            
            
          
            
        </form>

            </div>
        
  <button  type="submit" class="btn">Create Account</button>

        <p>Already have an account? <a href="#">Log in</a> </p>
              
            
        </div>
    </div>
</body>
</html>
